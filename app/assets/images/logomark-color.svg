<svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 36 36" fill="none">
  <!-- Column 1: short bar (cyan) -->
  <rect x="3" y="22" width="7" height="10" rx="2.5" fill="#22CCEE"/>
  <!-- Column 2: medium bar, two segments (blue + cyan accent) -->
  <rect x="14.5" y="15" width="7" height="17" rx="2.5" fill="#1570EF"/>
  <rect x="14.5" y="15" width="7" height="4.5" rx="2" fill="#22CCEE" opacity="0.5"/>
  <!-- Column 3: tall bar, two segments (purple + blue accent) -->
  <rect x="26" y="8" width="7" height="24" rx="2.5" fill="#6927DA"/>
  <rect x="26" y="8" width="7" height="4.5" rx="2" fill="#1570EF" opacity="0.5"/>
  <!-- Trend line connecting bar tops -->
  <polyline points="6.5,22 18,15 29.5,8" stroke="#F23E94" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Dots at bar tops -->
  <circle cx="6.5" cy="22" r="2" fill="#22CCEE"/>
  <circle cx="18" cy="15" r="2" fill="#1570EF"/>
  <circle cx="29.5" cy="8" r="2" fill="#F23E94"/>
</svg>
